# This service slot is repurposed for kitz-whatsapp-connector.
# Dockerfile clones the full repo inside the build to access kitz-schemas
# and kitz-whatsapp-connector source (needed because Railway Root Directory
# may scope the build context to kitz-email-connector/ only).
[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
