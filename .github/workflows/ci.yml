      - run: npm install
        working-directory: kitz-schemas
      - run: npm install
        working-directory: kitz-payments
      - run: npm run typecheck
        working-directory: kitz-payments
      - run: npm test
        working-directory: kitz-payments

  kitz-whatsapp-connector:
    needs: kitz-schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
