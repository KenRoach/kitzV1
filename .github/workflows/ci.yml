        with:
          node-version: '20'
      - run: npm install
        working-directory: kitz-schemas
      - run: npm install
        working-directory: workspace
      - run: npm run typecheck
        working-directory: workspace
      - run: npm test
        working-directory: workspace

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
