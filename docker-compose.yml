# KITZ OS — Docker Compose (Consolidated)
# Usage: docker compose up --build
#
# 5 services: postgres, migrate, kitz-os, whatsapp-connector, workspace
#
# REQUIRED: Create a .env file with at least:
#   POSTGRES_PASSWORD=<strong-random-password>
#   JWT_SECRET=<random-64-char-hex>
#   DEV_TOKEN_SECRET=<random-64-char-hex>
#
# Generate secrets: openssl rand -hex 32

x-service-defaults: &service-defaults
  build:
    context: .
    dockerfile: Dockerfile.service
  restart: unless-stopped
  networks:
    - kitz-net

x-env-common: &env-common
  NODE_ENV: development
  DATABASE_URL: postgres://kitz:${POSTGRES_PASSWORD}@postgres:5432/kitz

services:
  # ── Database ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kitz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kitz
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kitz-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitz"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Migrations ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    networks:
      - kitz-net
    environment:
      <<: *env-common
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── KITZ OS (port 3012) — Core brain + SPA + auth + payments + comms ──
  kitz-os:
    <<: *service-defaults
    build:
      context: .
      dockerfile: kitz_os/Dockerfile
    ports:
      - "3012:3012"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3012/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      <<: *env-common
      PORT: 3012
      # LLM providers
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      # Database
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      # Workspace
      WORKSPACE_API_URL: http://workspace:3001
      WORKSPACE_MCP_URL: ${WORKSPACE_MCP_URL:-}
      WORKSPACE_MCP_KEY: ${WORKSPACE_MCP_KEY:-}
      # Identity
      GOD_MODE_USER_ID: ${GOD_MODE_USER_ID:-}
      BUSINESS_ID: ${BUSINESS_ID:-}
      # Connectors
      WA_CONNECTOR_URL: http://kitz-whatsapp-connector:3006
      EMAIL_CONNECTOR_URL: http://kitz-email-connector:3007
      COMMS_API_URL: http://comms-api:3013
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      DEV_TOKEN_SECRET: ${DEV_TOKEN_SECRET}
      SERVICE_SECRET: ${DEV_TOKEN_SECRET}
      KITZ_DOMAIN: ${KITZ_DOMAIN:-https://workspace.kitz.services}
      KILL_SWITCH: ${KILL_SWITCH:-false}
      # Cadence
      CADENCE_PHONE: ${CADENCE_PHONE:-}
      CADENCE_EMAIL: ${CADENCE_EMAIL:-}
      # Payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      YAPPY_WEBHOOK_SECRET: ${YAPPY_WEBHOOK_SECRET:-}
      BAC_WEBHOOK_SECRET: ${BAC_WEBHOOK_SECRET:-}
      # Voice
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-eleven_multilingual_v2}
      ELEVENLABS_AGENT_ID: ${ELEVENLABS_AGENT_ID:-}
      # Google (Calendar, Gmail, Sheets, Drive)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://workspace.kitz.services/api/kitz/oauth/google/callback}
      # Email (absorbed from email-connector)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-kitz@kitz.services}
      # SMS/Voice (absorbed from comms-api)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_FROM: ${TWILIO_PHONE_FROM:-}
    volumes:
      - kitz_os_data:/app/kitz_os/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      workspace:
        condition: service_healthy

  # ── WhatsApp Connector (port 3006) — Baileys bridge (must be separate: stateful TCP) ──
  kitz-whatsapp-connector:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_DIR: kitz-whatsapp-connector
    ports:
      - "3006:3006"
    environment:
      <<: *env-common
      PORT: 3006
      KITZ_OS_URL: http://kitz-os:3012
      DEV_TOKEN_SECRET: ${DEV_TOKEN_SECRET}
      SERVICE_SECRET: ${DEV_TOKEN_SECRET}
      MAX_WA_SESSIONS: ${MAX_WA_SESSIONS:-30}
    volumes:
      - whatsapp_auth:/app/kitz-whatsapp-connector/auth_info_baileys
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      migrate:
        condition: service_completed_successfully

  # ── Workspace (port 3001) — CRM, orders, tasks, checkout, calendar ──
  # TODO Phase 4: Absorb into kitz-os as direct DB calls
  workspace:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_DIR: workspace
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      <<: *env-common
      PORT: 3001
      WA_CONNECTOR_URL: ${WA_CONNECTOR_URL:-http://kitz-whatsapp-connector:3006}
      JWT_SECRET: ${JWT_SECRET}
      DEV_TOKEN_SECRET: ${DEV_TOKEN_SECRET}
      SERVICE_SECRET: ${DEV_TOKEN_SECRET}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      WORKSPACE_MCP_URL: ${WORKSPACE_MCP_URL:-}
      WORKSPACE_MCP_KEY: ${WORKSPACE_MCP_KEY:-}
      ELEVENLABS_AGENT_ID: ${ELEVENLABS_AGENT_ID:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

networks:
  kitz-net:
    driver: bridge

volumes:
  pgdata:
  whatsapp_auth:
  kitz_os_data:
